<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Warframe Dashboard</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00ff99;
}

.item {
  background: #1a1a1a;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.title {
  font-weight: bold;
  color: #00ffcc;
}

.details {
  display: none;
  margin-top: 10px;
  opacity: 0.9;
}

.price {
  color: gold;
}
</style>

</head>

<body>

<h1>🔥 WARFRAME FARM DASHBOARD</h1>

<div id="app"></div>

<script>

async function load() {
  const res = await fetch("/data");
  const data = await res.json();

  const app = document.getElementById("app");
  app.innerHTML = "";

  for (const cat in data) {

    const catTitle = document.createElement("h2");
    catTitle.innerText = "=== " + cat + " ===";
    app.appendChild(catTitle);

    data[cat].slice(0, 20).forEach(item => {

      const div = document.createElement("div");
      div.className = "item";

      const details = `
        <div class="details">
          💰 ${item.price ?? "Sem dados"} Platinum <br>
          ⏱ Farm: 15–20 min <br>
          📍 Relíquias: Neo / Axi <br>
          🎯 Missões: Ukko / Apollo / Hepit <br>
          ★★★★★ Alta demanda
        </div>
      `;

      div.innerHTML = `
        <div class="title">▶ ${item.name}</div>
        ${details}
      `;

      div.onclick = () => {
        const d = div.querySelector(".details");
        d.style.display = d.style.display === "block" ? "none" : "block";
      };

      app.appendChild(div);
    });
  }
}

load();
setInterval(load, 30000);

</script>

</body>
</html>
